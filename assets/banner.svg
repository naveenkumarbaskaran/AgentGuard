<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="50%" style="stop-color:#0a0108"/>
      <stop offset="100%" style="stop-color:#0a0520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="40%" style="stop-color:#f97316"/>
      <stop offset="70%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020818;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#fbbf24;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </linearGradient>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="stars" x="0" y="0" width="120" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="15" r="0.8" fill="#ffffff" opacity="0.3"/>
      <circle cx="45" cy="5" r="0.6" fill="#ffffff" opacity="0.25"/>
      <circle cx="80" cy="30" r="1" fill="#ffffff" opacity="0.4"/>
      <circle cx="5" cy="72" r="0.5" fill="#ef4444" opacity="0.5"/>
      <circle cx="55" cy="40" r="0.5" fill="#f97316" opacity="0.4"/>
      <circle cx="100" cy="45" r="0.6" fill="#fbbf24" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1200" height="340" fill="url(#bgGrad)"/>
  <rect width="1200" height="340" fill="url(#stars)" opacity="0.8"/>
  <line x1="0" y1="170" x2="340" y2="170" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4"/>
  <line x1="860" y1="170" x2="1200" y2="170" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="80" cy="170" r="6" fill="#ef4444" opacity="0.9" filter="url(#glowRed)"/>
  <circle cx="160" cy="170" r="5" fill="#f97316" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="240" cy="170" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="300" cy="170" r="4" fill="#ef4444" opacity="0.5"/>
  <circle cx="900" cy="170" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="960" cy="170" r="6" fill="#ef4444" opacity="0.9" filter="url(#glowRed)"/>
  <circle cx="1040" cy="170" r="5" fill="#f97316" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="1120" cy="170" r="6" fill="#fbbf24" opacity="0.8"/>
  <line x1="80" y1="170" x2="80" y2="200" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="170" x2="160" y2="195" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="170" x2="240" y2="205" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <line x1="960" y1="170" x2="960" y2="205" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <line x1="1040" y1="170" x2="1040" y2="195" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <line x1="1120" y1="170" x2="1120" y2="200" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <text x="80" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.8">injection</text>
  <text x="160" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316" opacity="0.7">jailbreak</text>
  <text x="240" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.7">pii_scan</text>
  <text x="960" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.8">tool_guard</text>
  <text x="1040" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316" opacity="0.7">redact</text>
  <text x="1120" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.7">filter</text>
  <rect x="360" y="115" width="480" height="110" rx="12" fill="#050d2a" stroke="#ef4444" stroke-width="1.5" opacity="0.95"/>
  <rect x="360" y="115" width="480" height="110" rx="12" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="158" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="42" font-weight="700" fill="url(#titleGrad)" filter="url(#textGlow)">agentguard</text>
  <text x="600" y="185" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#f97316" opacity="0.9" letter-spacing="2">Safety guardrails for production AI agents.</text>
  <text x="600" y="270" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#fbbf24" opacity="0.65" letter-spacing="1">Injection · PII · Jailbreak · Tool governance · Output filtering</text>
  <rect x="15" y="15" width="30" height="2" fill="#ef4444" opacity="0.5"/>
  <rect x="15" y="15" width="2" height="30" fill="#ef4444" opacity="0.5"/>
  <rect x="1155" y="15" width="30" height="2" fill="#fbbf24" opacity="0.4"/>
  <rect x="1183" y="15" width="2" height="30" fill="#fbbf24" opacity="0.4"/>
  <rect x="15" y="323" width="30" height="2" fill="#f97316" opacity="0.4"/>
  <rect x="15" y="293" width="2" height="30" fill="#f97316" opacity="0.4"/>
  <rect x="1155" y="323" width="30" height="2" fill="#ef4444" opacity="0.5"/>
  <rect x="1183" y="293" width="2" height="30" fill="#ef4444" opacity="0.5"/>
</svg>
